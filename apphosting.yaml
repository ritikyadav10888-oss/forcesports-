# Firebase App Hosting — Force Sports & Wears India
# Console: https://console.firebase.google.com/project/force-sports-and-wears-i-a38aa/apphosting
#
# If your backend ID in the console differs from firebase.json, update backendId there to match.
# Console env vars override values here. Use secrets for RESEND_API_KEY (see docs/FIREBASE-DEPLOY.md).

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDYoXF1kRGqHD6J9UK5HpzdlVCMJBxNHdA
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: force-sports-and-wears-i-a38aa.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: force-sports-and-wears-i-a38aa
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: force-sports-and-wears-i-a38aa.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "886374682791"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:886374682791:web:dc57b91ae20cde9590cb82
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-QYY8VZXZS2
    availability:
      - BUILD
      - RUNTIME

  # Set to your live App Hosting URL after first deploy (e.g. https://forcesports-web--force-sports-and-wears-i-a38aa.us-central1.hosted.app)
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://force-sports-and-wears-i-a38aa.web.app
    availability:
      - BUILD
      - RUNTIME

  # Create in Secret Manager: firebase apphosting:secrets:set RESEND_API_KEY
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME
